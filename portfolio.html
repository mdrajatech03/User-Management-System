<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | RAJATECH</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <nav class="nav-bar">
        <div class="logo"><h2>RAJA<span>TECH</span></h2></div>
        <div>
            <button id="adminBtn" class="admin-btn" onclick="location.href='admin.html'">Admin Panel</button>
            <button id="logoutBtn" class="logout-btn">Logout</button>
        </div>
    </nav>

    <section id="welcomeScreen" class="main-content">
        <div class="glass-card" style="text-align:center;">
            <h1>Welcome to Digital ID Portal</h1>
            <p>Create your professional identity card in seconds.</p>
            <button class="primary-btn" onclick="showSection('formSection')">Create Profile Now</button>
        </div>
    </section>

    <section id="formSection" class="main-content" style="display:none;">
        <div class="glass-card">
            <div class="close-form" onclick="goBack()">×</div>
            <h3>Enrollment Form</h3>
            <div class="form-grid">
                <div class="input-group"><label>Profile Photo</label><input type="file" id="fImage" accept="image/*"></div>
                <div class="input-group"><label>Full Name</label><input type="text" id="fName"></div>
                <div class="input-group"><label>Aadhar (12 Digits)</label><input type="number" id="fAadhar"></div>
                <div class="input-group"><label>DOB</label><input type="date" id="fDob"></div>
                <div class="input-group"><label>Blood Group</label><input type="text" id="fBlood"></div>
                <div class="input-group"><label>Father's Name</label><input type="text" id="fFather"></div>
                <div class="input-group"><label>Address</label><textarea id="fAddress"></textarea></div>
            </div>
            <button class="primary-btn" onclick="triggerPreview()">Generate ID Card</button>
        </div>
    </section>

    <section id="viewSection" class="main-content" style="display:none;">
        <div class="id-card" id="printableArea">
            <div style="background:var(--primary); color:#000; padding:10px; font-weight:bold;">IDENTITY CARD</div>
            <div style="padding:20px;">
                <img id="pImg" src="" style="width:100px; height:100px; border-radius:50%; border:2px solid var(--primary); object-fit:cover;">
                <h3 id="pName" style="margin-top:10px;"></h3>
                <p id="pEmail" style="font-size:12px; color:var(--primary);"></p>
                <div style="display:grid; grid-template-columns:1fr 1fr; font-size:10px; text-align:left; margin-top:15px; border-top:1px solid #333; padding-top:10px;">
                    <p>DOB: <span id="pDob"></span></p>
                    <p>Blood: <span id="pBlood"></span></p>
                    <p>Aadhar: <span id="pAadhar"></span></p>
                    <p>Father: <span id="pFather"></span></p>
                </div>
            </div>
        </div>
        <div class="action-buttons">
            <button id="saveBtn" class="primary-btn" style="background:var(--success); color:#fff;" onclick="finalSave()">Save Data</button>
            <button class="primary-btn" style="background:#6366f1; color:#fff;" onclick="exportPDF()">Download PDF</button>
            <button class="primary-btn" style="background:var(--warning); color:#fff;" onclick="showSection('formSection')">Edit Profile</button>
        </div>
    </section>

    <script type="module" src="portfolio.js"></script>
</body>
</html>
