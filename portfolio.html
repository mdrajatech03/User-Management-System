<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | RAJATECH</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <nav class="nav-bar">
        <div class="logo"><h3>RAJA<span style="color:var(--primary)">TECH</span></h3></div>
        <div class="nav-btns">
            <button id="adminBtn" class="admin-btn" onclick="location.href='admin.html'">Admin</button>
            <button id="logoutBtn" class="logout-btn">Logout</button>
        </div>
    </nav>

    <section id="welcomeScreen" class="main-content">
        <div class="glass-card" style="text-align:center">
            <h1>No Profile Found</h1>
            <p style="margin:15px 0; color:#94a3b8;">It looks like you haven't generated your digital ID yet.</p>
            <button class="btn btn-primary" onclick="showSection('formSection')">Get Started Now</button>
        </div>
    </section>

    <section id="formSection" class="main-content" style="display:none;">
    <div class="glass-card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
            <h2 style="color: var(--primary);">ID Enrollment Form</h2>
            <button class="btn" style="background:rgba(255,255,255,0.1); color:#fff; padding:5px 15px; border:1px solid rgba(255,255,255,0.2);" onclick="showSection('welcomeScreen')">Back</button>
        </div>
        
        <div class="form-grid">
            <div class="input-box"><label>Full Name</label><input type="text" id="fName" placeholder="Enter Name"></div>
            <div class="input-box"><label>Father's Name</label><input type="text" id="fFather" placeholder="Father's Name"></div>
            <div class="input-box"><label>Aadhar (12 Digit)</label><input type="number" id="fAadhar" placeholder="1234 5678 9012"></div>
            <div class="input-box"><label>Date of Birth</label><input type="date" id="fDob"></div>
            <div class="input-box"><label>Blood Group</label><input type="text" id="fBlood" placeholder="O+, AB+, etc."></div>
            <div class="input-box">
                <label>Category</label>
                <select id="fCategory">
                    <option value="Student">Student</option>
                    <option value="Professional">Professional</option>
                    <option value="Member">Member</option>
                </select>
            </div>
            
            <div class="input-box" style="grid-column: 1 / -1;">
                <label>Profile Photo (Max 1MB)</label>
                <input type="file" id="fImage" accept="image/*" style="border: 1px dashed var(--primary); padding: 20px;">
                <p style="font-size:11px; color:#94a3b8; margin-top:5px;">⚠️ File size must be under 1MB for successful saving.</p>
            </div>
        </div>
        
        <button class="btn btn-primary" style="margin-top:20px; letter-spacing: 1px;" onclick="triggerPreview()">GENERATE PREVIEW</button>
    </div>
    </section>
    

    <section id="viewSection" class="main-content">
        <div id="printableArea" class="id-card">
    <div class="id-header">DIGITAL IDENTITY SYSTEM</div>
    <div class="id-body">
        <img id="pImg" class="user-img" src="">
        <h2 id="pName">User Name</h2>
        <p id="pEmail" style="font-size:11px; color:var(--primary); margin-bottom:10px;"></p>
        
        <div class="id-details">
            <p>DOB: <br><b id="pDob">-</b></p>
            <p>Blood: <br><b id="pBlood">-</b></p>
            <p>Aadhar: <br><b id="pAadhar">-</b></p>
            <p>Father: <br><b id="pFather">-</b></p> </div>
        <div style="margin-top:10px; border-top:1px solid rgba(255,255,255,0.1); padding-top:5px;">
            <span style="font-size:10px; color:var(--primary);">Role: </span><b id="pCategory" style="font-size:10px;">-</b>
        </div>
    </div>
        </div>
        
        <div class="action-grid">
            <button id="saveBtn" class="btn" style="background:var(--success); color:#000;" onclick="finalSave()">Confirm & Save</button>
            <button class="btn" style="background:#6366f1; color:#fff;" onclick="exportPDF()">Download PDF</button>
            <button class="btn" style="background:#f59e0b; color:#000;" onclick="showSection('formSection')">Edit Profile</button>
        </div>
    </section>

    <script type="module" src="portfolio.js"></script>
</body>
</html>
