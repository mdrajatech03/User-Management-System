<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | RAJATECH</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <nav class="nav-bar">
        <div class="nav-logo">
            <h2>RAJA<span style="color:#00f2fe">TECH</span></h2>
        </div>
        <div class="nav-admin-center">
            <button id="adminBtn" class="btn-admin" style="display:none;" onclick="location.href='admin.html'">Admin Panel</button>
        </div>
        <div class="nav-logout-right">
            <button id="logoutBtn" class="btn-logout">Logout</button>
        </div>
    </nav>

    <div id="welcomeScreen" class="full-page" style="display:none;">
        <div class="glass-card">
            <h1>Welcome!</h1>
            <p>Your profile is not setup yet.</p>
            <button class="btn-save" style="width:100%; margin-top:15px;" onclick="showSection('formSection')">Create Profile Now</button>
        </div>
    </div>

    <div id="formSection" class="full-page" style="display:none;">
        <div class="glass-card">
            <h2>Complete Profile</h2>
            <input type="file" id="fImage" accept="image/*" style="margin:15px 0;">
            <input type="text" id="fName" placeholder="Full Name" style="width:100%; padding:10px; margin-bottom:10px; border-radius:5px; border:none;">
            <input type="text" id="fFather" placeholder="Father's Name" style="width:100%; padding:10px; margin-bottom:10px; border-radius:5px; border:none;">
            <button class="btn-save" style="width:100%" onclick="triggerPreview()">Preview Profile</button>
        </div>
    </div>

    <div id="viewSection" class="full-page" style="display:none;">
        <div class="glass-card" id="printableArea">
            <img id="pImg" src="" class="p-img">
            <h2 id="pName" style="color:#00f2fe"></h2>
            <p id="pEmail" style="opacity:0.7"></p>
            <div class="p-details">
                <p>Father: <span id="pFather"></span></p>
                <p>Status: <span style="color:#10b981">Verified Member</span></p>
            </div>
        </div>

        <div class="btn-group">
            <button id="saveBtn" class="btn-save" onclick="finalSave()">Save Data</button>
            <button class="btn-download" onclick="exportPDF()">Download PDF</button>
            <button id="editBtn" class="btn-edit" onclick="showSection('formSection')">Edit Profile</button>
        </div>
    </div>

    <script type="module" src="portfolio.js"></script>
</body>
</html>
