<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | RAJATECH</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <nav class="nav-bar">
        <div class="logo"><h3>RAJA<span style="color:var(--primary)">TECH</span></h3></div>
        <div class="nav-btns">
            <button id="adminBtn" class="admin-btn" onclick="location.href='admin.html'">Admin</button>
            <button id="logoutBtn" class="logout-btn">Logout</button>
        </div>
    </nav>

    <section id="welcomeScreen" class="main-content">
        <div class="glass-card" style="text-align:center">
            <h1>No Profile Found</h1>
            <p style="margin:15px 0; color:#94a3b8;">It looks like you haven't generated your digital ID yet.</p>
            <button class="btn btn-primary" onclick="showSection('formSection')">Get Started Now</button>
        </div>
    </section>

    <section id="formSection" class="main-content">
        <div class="glass-card">
            <h2>ID Enrollment Form</h2>
            <div class="form-grid">
                <div class="input-box"><label>Full Name</label><input type="text" id="fName"></div>
                <div class="input-box"><label>Aadhar (12 Digits)</label><input type="number" id="fAadhar"></div>
                <div class="input-box"><label>DOB</label><input type="date" id="fDob"></div>
                <div class="input-box"><label>Blood Group</label><input type="text" id="fBlood" placeholder="e.g. B+"></div>
                <div class="input-box"><label>Father's Name</label><input type="text" id="fFather"></div>
                <div class="input-box"><label>Category</label>
                    <select id="fCategory">
                        <option value="Student">Student</option>
                        <option value="Professional">Professional</option>
                        <option value="VIP Guest">VIP Guest</option>
                    </select>
                </div>
                <div class="input-box" style="grid-column: 1 / -1;"><label>Profile Photo</label><input type="file" id="fImage" accept="image/*"></div>
            </div>
            <button class="btn btn-primary" style="margin-top:20px;" onclick="triggerPreview()">Generate ID Card</button>
        </div>
    </section>

    <section id="viewSection" class="main-content">
        <div id="printableArea" class="id-card">
            <div class="id-header">DIGITAL IDENTITY SYSTEM</div>
            <div class="id-body">
                <img id="pImg" class="user-img" src="">
                <h2 id="pName"></h2>
                <p id="pEmail" style="font-size:11px; color:var(--primary); margin-bottom:10px;"></p>
                <div class="id-details">
                    <p>DOB: <br><b id="pDob"></b></p>
                    <p>Blood: <br><b id="pBlood"></b></p>
                    <p>Aadhar: <br><b id="pAadhar"></b></p>
                    <p>Role: <br><b id="pCategory"></b></p>
                </div>
            </div>
        </div>
        <div class="action-grid">
            <button id="saveBtn" class="btn" style="background:var(--success); color:#000;" onclick="finalSave()">Confirm & Save</button>
            <button class="btn" style="background:#6366f1; color:#fff;" onclick="exportPDF()">Download PDF</button>
            <button class="btn" style="background:#f59e0b; color:#000;" onclick="showSection('formSection')">Edit Profile</button>
        </div>
    </section>

    <script type="module" src="portfolio.js"></script>
</body>
</html>
