<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | RAJATECH</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="admin-container">
        <header class="nav-bar">
            <h2>Admin <span>Dashboard</span></h2>
            <button onclick="location.href='portfolio.html'" class="btn-save">Back to Profile</button>
        </header>
        <div class="stats">Total Members: <span id="userCount">0</span></div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr><th>Photo</th><th>Name</th><th>Email</th><th>Category</th><th>Action</th></tr>
                </thead>
                <tbody id="userList"></tbody>
            </table>
        </div>
    </div>
    <script type="module" src="admin.js"></script>
</body>
</html>
