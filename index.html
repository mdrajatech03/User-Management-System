<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | RAJATECH</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="full-page">
        <div class="glass-card auth-box">
            <h2 id="authTitle">Login to RAJATECH</h2>
            <form id="authForm">
                <div class="input-box" id="nameBox" style="display:none;">
                    <label>Full Name</label>
                    <input type="text" id="regName" placeholder="Enter Name">
                </div>
                <div class="input-box">
                    <label>Email Address</label>
                    <input type="email" id="authEmail" required placeholder="email@example.com">
                </div>
                <div class="input-box">
                    <label>Password</label>
                    <input type="password" id="authPass" required placeholder="******">
                </div>
                <button type="submit" id="authBtn" class="btn-submit">Sign In</button>
            </form>
            <p id="toggleText" style="margin-top:20px; cursor:pointer; color:#00f2fe;">New user? Register here</p>
        </div>
    </div>
    <script type="module" src="auth.js"></script>
</body>
</html>
