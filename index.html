<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth | RAJATECH</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="auth-container">
        <div class="glass-card auth-card">
            <h1 class="logo">RAJA<span>TECH</span></h1>
            <h2 id="authTitle" style="margin-bottom: 20px;">Secure Login</h2>
            <form id="authForm">
                <div class="input-group" id="nameGroup" style="display:none;">
                    <input type="text" id="regName" placeholder="Full Name">
                </div>
                <div class="input-group">
                    <input type="email" id="authEmail" required placeholder="Email Address">
                </div>
                <div class="input-group">
                    <input type="password" id="authPass" required placeholder="Password">
                </div>
                <button type="submit" id="authBtn" class="primary-btn">Sign In</button>
            </form>
            <p id="toggleText" class="toggle-link">Don't have an account? Register</p>
        </div>
    </div>
    <script type="module" src="auth.js"></script>
</body>
</html>
